<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenUSDT - 钱包管理</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; min-height: 100vh; display: flex; }
    .sidebar { width: 220px; background: #0d0d0d; color: #fff; min-height: 100vh; position: fixed; top: 0; left: 0; z-index: 100; display: flex; flex-direction: column; }
    .sidebar-brand { padding: 20px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid rgba(255,255,255,.1); }
    .sidebar-brand svg { width: 28px; height: 28px; }
    .sidebar-brand span { font-size: 16px; font-weight: 700; }
    .sidebar-nav { flex: 1; padding: 12px 0; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 12px 20px; color: rgba(255,255,255,.6); text-decoration: none; font-size: 14px; font-weight: 500; transition: all .15s; }
    .nav-item:hover { color: #fff; background: rgba(255,255,255,.08); }
    .nav-item.active { color: #fff; background: rgba(255,255,255,.12); }
    .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }
    .sidebar-footer { padding: 16px 20px; border-top: 1px solid rgba(255,255,255,.1); font-size: 12px; color: rgba(255,255,255,.4); text-align: center; }
    .main { flex: 1; margin-left: 220px; padding: 24px; }
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .page-title { font-size: 22px; font-weight: 700; color: #0d0d0d; }
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; border: none; cursor: pointer; transition: all .15s; text-decoration: none; }
    .btn-primary { background: #0d0d0d; color: #fff; }
    .btn-primary:hover { background: #1a1a1a; }
    .btn-success { background: #10b981; color: #fff; }
    .btn-danger { background: #ef4444; color: #fff; }
    .btn-outline { background: #fff; color: #374151; border: 1.5px solid #e5e7eb; }
    .btn-outline:hover { border-color: #9ca3af; }
    .btn-sm { padding: 5px 10px; font-size: 12px; }
    .card { background: #fff; border-radius: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.06); padding: 20px; margin-bottom: 16px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 12px 14px; font-weight: 600; color: #6b7280; border-bottom: 1.5px solid #e5e7eb; white-space: nowrap; }
    td { padding: 12px 14px; border-bottom: 1px solid #f3f4f6; color: #374151; }
    tr:hover td { background: #f9fafb; }
    .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .badge-success { background: #d1fae5; color: #065f46; }
    .badge-danger { background: #fee2e2; color: #991b1b; }
    .addr-cell { font-family: 'SFMono-Regular', Menlo, monospace; font-size: 12px; max-width: 280px; word-break: break-all; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 200; display: none; align-items: center; justify-content: center; }
    .modal-overlay.show { display: flex; }
    .modal-card { background: #fff; border-radius: 16px; width: 100%; max-width: 520px; box-shadow: 0 24px 64px rgba(0,0,0,.2); }
    .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 20px 24px 0; font-size: 17px; font-weight: 700; }
    .modal-close { width: 32px; height: 32px; border-radius: 50%; border: none; background: #f3f4f6; cursor: pointer; font-size: 18px; color: #6b7280; }
    .modal-body { padding: 20px 24px; }
    .modal-footer { padding: 16px 24px; display: flex; justify-content: flex-end; gap: 8px; border-top: 1px solid #f3f4f6; }
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; }
    .form-input, .form-select { width: 100%; padding: 10px 14px; border: 1.5px solid #e5e7eb; border-radius: 8px; font-size: 14px; color: #0d0d0d; background: #fff; outline: none; }
    .form-input:focus, .form-select:focus { border-color: #0d0d0d; }
    .form-hint { font-size: 12px; color: #9ca3af; margin-top: 4px; }
    .empty-state { text-align: center; padding: 40px 20px; color: #9ca3af; }
    @media (max-width: 768px) { .sidebar { display: none; } .main { margin-left: 0; } }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-brand">
      <svg viewBox="0 0 24 24" fill="white"><path d="M17.06 11.57c.59-.69.94-1.58.94-2.57 0-2.21-1.79-4-4-4H7v14h7.5c2.49 0 4.5-2.01 4.5-4.5 0-1.33-.58-2.52-1.5-3.35l.56-.58zM9 7h4.5c.83 0 1.5.67 1.5 1.5S14.33 10 13.5 10H9V7zm5.5 10H9v-3h5.5c.83 0 1.5.67 1.5 1.5S15.33 17 14.5 17z"/><path d="M10 3.5V2h1.5v1.5H10zM13 3.5V2h1.5v1.5H13zM10 22v-1.5h1.5V22H10zM13 22v-1.5h1.5V22H13z"/></svg>
      <span>OpenUSDT</span>
    </div>
    <nav class="sidebar-nav">
      <a class="nav-item" href="index.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>首页</a>
      <a class="nav-item active" href="wallets.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 10h20"/></svg>钱包管理</a>
      <a class="nav-item" href="orders.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>交易订单</a>
      <a class="nav-item" href="settings.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.73 12.73l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>基本设置</a>
    </nav>
    <div class="sidebar-footer"><a href="#" id="logoutBtn" style="color:rgba(255,255,255,.6);text-decoration:none;">退出登录</a></div>
  </aside>

  <div class="main">
    <div class="page-header">
      <h1 class="page-title">钱包管理</h1>
      <button class="btn btn-primary" onclick="showAddModal()">+ 新增钱包</button>
    </div>
    <div class="card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>名称</th>
              <th>交易类型</th>
              <th>钱包地址</th>
              <th>状态</th>
              <th class="text-right">操作</th>
            </tr>
          </thead>
          <tbody id="walletList"></tbody>
        </table>
        <div class="empty-state" id="emptyState" style="display:none;">暂无钱包数据</div>
      </div>
    </div>
  </div>

  <!-- 新增/编辑弹窗 -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-card">
      <div class="modal-header">
        <span id="modalTitle">新增钱包</span>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="editId">
        <div class="form-group">
          <label class="form-label">钱包名称 *</label>
          <input class="form-input" id="walletName" placeholder="如：USDT-BEP20">
        </div>
        <div class="form-group">
          <label class="form-label">交易类型 (trade_type) *</label>
          <select class="form-select" id="walletTypeSelect" onchange="onTypeSelectChange()">
            <option value="">-- 选择预设类型 --</option>
            <option value="usdt.bep20">USDT-BEP20 (BSC)</option>
            <option value="usdt.erc20">USDT-ERC20 (Ethereum)</option>
            <option value="usdt.trc20">USDT-TRC20 (TRON)</option>
            <option value="usdt.polygon">USDT-Polygon</option>
            <option value="usdc.bep20">USDC-BEP20 (BSC)</option>
            <option value="usdc.erc20">USDC-ERC20 (Ethereum)</option>
            <option value="usdc.polygon">USDC-Polygon</option>
            <option value="trx.trx">TRX-TRON</option>
            <option value="__custom__">自定义...</option>
          </select>
          <input class="form-input" id="walletType" placeholder="如：usdt.bep20" style="margin-top:8px;display:none;">
          <div class="form-hint">格式：币种.网络，如 usdt.bep20、USDC.Polygon、tron.trx</div>
        </div>
        <div class="form-group">
          <label class="form-label">钱包地址 *</label>
          <input class="form-input" id="walletAddress" placeholder="输入完整钱包地址">
        </div>
        <div class="form-group">
          <label class="form-label">状态</label>
          <select class="form-select" id="walletStatus">
            <option value="1">启用</option>
            <option value="0">禁用</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeModal()">取消</button>
        <button class="btn btn-primary" id="saveBtn" onclick="saveWallet()">保存</button>
      </div>
    </div>
  </div>

  <!-- 删除确认弹窗 -->
  <div class="modal-overlay" id="deleteOverlay">
    <div class="modal-card" style="max-width:380px;">
      <div class="modal-body" style="text-align:center;padding:32px 24px;">
        <div style="font-size:16px;font-weight:700;margin-bottom:8px;">确认删除？</div>
        <div style="font-size:13px;color:#6b7280;">删除后不可恢复，确定要删除这个钱包吗？</div>
      </div>
      <div class="modal-footer" style="justify-content:center;">
        <button class="btn btn-outline" onclick="document.getElementById('deleteOverlay').classList.remove('show')">取消</button>
        <button class="btn btn-danger" id="confirmDeleteBtn">确认删除</button>
      </div>
    </div>
  </div>

  <script src="../shared/notify.js"></script>
  <script src="admin-common.js"></script>
  <script>
    if (!Admin.requireAuth()) throw new Error('not logged in');

    document.getElementById('logoutBtn').addEventListener('click', function(e) {
      e.preventDefault();
      Admin.request('/api/admin/logout', {}).then(function() { Admin.clearToken(); window.location.href = 'login.html'; });
    });

    // 常见 trade_type 选项
    var TRADE_TYPES = [
      { value: 'usdt.bep20', label: 'USDT-BEP20 (BSC)' },
      { value: 'usdt.erc20', label: 'USDT-ERC20 (Ethereum)' },
      { value: 'usdt.trc20', label: 'USDT-TRC20 (TRON)' },
      { value: 'usdt.polygon', label: 'USDT-Polygon' },
      { value: 'usdc.bep20', label: 'USDC-BEP20 (BSC)' },
      { value: 'usdc.erc20', label: 'USDC-ERC20 (Ethereum)' },
      { value: 'usdc.polygon', label: 'USDC-Polygon' },
      { value: 'trx.trx', label: 'TRX-TRON' },
    ];

    var wallets = [];

    function loadWallets() {
      Admin.request('/api/admin/wallet/list', {}).then(function (res) {
        if (res.status_code !== 200) return;
        wallets = res.data.list || [];
        renderWallets();
      });
    }

    function renderWallets() {
      var tbody = document.getElementById('walletList');
      var empty = document.getElementById('emptyState');
      if (!wallets.length) { tbody.innerHTML = ''; empty.style.display = ''; return; }
      empty.style.display = 'none';
      tbody.innerHTML = wallets.map(function (w) {
        var statusBadge = w.status === 1
          ? '<span class="badge badge-success">启用</span>'
          : '<span class="badge badge-danger">禁用</span>';
        return '<tr>'
          + '<td>' + w.id + '</td>'
          + '<td><strong>' + (w.name || '--') + '</strong></td>'
          + '<td><code style="background:#f3f4f6;padding:2px 6px;border-radius:4px;font-size:12px;">' + (w.trade_type || '--') + '</code></td>'
          + '<td class="addr-cell">' + (w.wallet_address || '--') + '</td>'
          + '<td>' + statusBadge + '</td>'
          + '<td class="text-right">'
          + '<button class="btn btn-outline btn-sm" onclick="editWallet(' + w.id + ')">修改</button> '
          + '<button class="btn btn-danger btn-sm" onclick="deleteWallet(' + w.id + ')">删除</button>'
          + '</td></tr>';
      }).join('');
    }

    // 预设交易类型列表
    var PRESET_TYPES = [
      'usdt.bep20', 'usdt.erc20', 'usdt.trc20', 'usdt.polygon',
      'usdc.bep20', 'usdc.erc20', 'usdc.polygon', 'trx.trx'
    ];

    function onTypeSelectChange() {
      var sel = document.getElementById('walletTypeSelect');
      var input = document.getElementById('walletType');
      if (sel.value === '__custom__') {
        input.style.display = '';
        input.value = '';
        input.focus();
      } else if (sel.value) {
        input.style.display = 'none';
        input.value = sel.value;
      } else {
        input.style.display = 'none';
        input.value = '';
      }
    }

    function setTypeValue(tradeType) {
      var sel = document.getElementById('walletTypeSelect');
      var input = document.getElementById('walletType');
      if (PRESET_TYPES.indexOf(tradeType) !== -1) {
        sel.value = tradeType;
        input.style.display = 'none';
        input.value = tradeType;
      } else {
        sel.value = '__custom__';
        input.style.display = '';
        input.value = tradeType || '';
      }
    }

    function showAddModal() {
      document.getElementById('editId').value = '';
      document.getElementById('walletName').value = '';
      document.getElementById('walletTypeSelect').value = '';
      document.getElementById('walletType').value = '';
      document.getElementById('walletType').style.display = 'none';
      document.getElementById('walletAddress').value = '';
      document.getElementById('walletStatus').value = '1';
      document.getElementById('modalTitle').textContent = '新增钱包';
      document.getElementById('modalOverlay').classList.add('show');
    }

    function editWallet(id) {
      var w = wallets.find(function(x){ return x.id == id; });
      if (!w) { Admin.showToast('找不到钱包', 'error'); return; }
      document.getElementById('editId').value = w.id;
      document.getElementById('walletName').value = w.name || '';
      setTypeValue(w.trade_type || '');
      document.getElementById('walletAddress').value = w.wallet_address || '';
      document.getElementById('walletStatus').value = w.status;
      document.getElementById('modalTitle').textContent = '修改钱包';
      document.getElementById('modalOverlay').classList.add('show');
    }

    function saveWallet() {
      var id = document.getElementById('editId').value;
      var name = document.getElementById('walletName').value.trim();
      var tradeType = document.getElementById('walletType').value.trim();
      var address = document.getElementById('walletAddress').value.trim();
      var status = parseInt(document.getElementById('walletStatus').value);

      if (!name || !tradeType || !address) {
        Admin.showToast('请填写所有必填项', 'error');
        return;
      }

      var btn = document.getElementById('saveBtn');
      btn.disabled = true;
      btn.textContent = '保存中...';

      var data = { name: name, trade_type: tradeType, wallet_address: address, status: status };
      var apiPath = '/api/admin/wallet/add';

      if (id) {
        apiPath = '/api/admin/wallet/update';
        data.id = parseInt(id);
      }

      Admin.request(apiPath, data).then(function (res) {
        btn.disabled = false;
        btn.textContent = '保存';
        if (res.status_code === 200) {
          Admin.showToast(id ? '修改成功' : '添加成功', 'success');
          closeModal();
          loadWallets();
        } else {
          Admin.showToast(res.message || '操作失败', 'error');
        }
      }).catch(function(err) {
        btn.disabled = false;
        btn.textContent = '保存';
        Admin.showToast('网络错误: ' + err.message, 'error');
      });
    }

    function deleteWallet(id) {
      document.getElementById('deleteOverlay').classList.add('show');
      document.getElementById('confirmDeleteBtn').onclick = function () {
        Admin.request('/api/admin/wallet/delete', { id: id }).then(function (res) {
          document.getElementById('deleteOverlay').classList.remove('show');
          if (res.status_code === 200) {
            Admin.showToast('删除成功', 'success');
            loadWallets();
          } else {
            Admin.showToast(res.message || '删除失败', 'error');
          }
        }).catch(function(err) {
          document.getElementById('deleteOverlay').classList.remove('show');
          Admin.showToast('网络错误: ' + err.message, 'error');
        });
      };
    }

    function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }

    loadWallets();
  </script>
</body>
</html>
