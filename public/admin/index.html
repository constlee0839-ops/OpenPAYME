<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenUSDT 管理后台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; min-height: 100vh; display: flex; }

    /* 侧边栏 */
    .sidebar {
      width: 220px; background: #0d0d0d; color: #fff; min-height: 100vh;
      position: fixed; top: 0; left: 0; z-index: 100;
      display: flex; flex-direction: column;
    }
    .sidebar-brand {
      padding: 20px; display: flex; align-items: center; gap: 10px;
      border-bottom: 1px solid rgba(255,255,255,.1);
    }
    .sidebar-brand svg { width: 28px; height: 28px; }
    .sidebar-brand span { font-size: 16px; font-weight: 700; }
    .sidebar-nav { flex: 1; padding: 12px 0; }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 20px; color: rgba(255,255,255,.6); text-decoration: none;
      font-size: 14px; font-weight: 500; transition: all .15s; cursor: pointer;
    }
    .nav-item:hover { color: #fff; background: rgba(255,255,255,.08); }
    .nav-item.active { color: #fff; background: rgba(255,255,255,.12); }
    .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }
    .sidebar-footer {
      padding: 16px 20px; border-top: 1px solid rgba(255,255,255,.1);
      font-size: 12px; color: rgba(255,255,255,.4); text-align: center;
    }

    /* 主内容区 */
    .main { flex: 1; margin-left: 220px; padding: 24px; }
    .page-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 24px;
    }
    .page-title { font-size: 22px; font-weight: 700; color: #0d0d0d; }
    .page-actions { display: flex; gap: 8px; }

    /* 按钮 */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600;
      border: none; cursor: pointer; transition: all .15s; text-decoration: none;
    }
    .btn-primary { background: #0d0d0d; color: #fff; }
    .btn-primary:hover { background: #1a1a1a; }
    .btn-success { background: #10b981; color: #fff; }
    .btn-success:hover { background: #059669; }
    .btn-danger { background: #ef4444; color: #fff; }
    .btn-danger:hover { background: #dc2626; }
    .btn-outline {
      background: #fff; color: #374151; border: 1.5px solid #e5e7eb;
    }
    .btn-outline:hover { border-color: #9ca3af; }
    .btn-sm { padding: 5px 10px; font-size: 12px; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    /* 卡片 */
    .card {
      background: #fff; border-radius: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.06);
      padding: 20px; margin-bottom: 16px;
    }

    /* 统计卡片 */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .stat-card {
      background: #fff; border-radius: 12px; padding: 20px;
      box-shadow: 0 1px 3px rgba(0,0,0,.06); border-left: 4px solid;
    }
    .stat-label { font-size: 13px; color: #6b7280; margin-bottom: 8px; }
    .stat-value { font-size: 28px; font-weight: 800; color: #0d0d0d; letter-spacing: -1px; }
    .stat-sub { font-size: 12px; color: #9ca3af; margin-top: 4px; }

    /* 表格 */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 12px 14px; font-weight: 600; color: #6b7280; border-bottom: 1.5px solid #e5e7eb; white-space: nowrap; }
    td { padding: 12px 14px; border-bottom: 1px solid #f3f4f6; color: #374151; }
    tr:hover td { background: #f9fafb; }
    .text-right { text-align: right; }
    .text-center { text-align: center; }

    /* 状态标签 */
    .badge {
      display: inline-block; padding: 3px 10px; border-radius: 20px;
      font-size: 12px; font-weight: 600;
    }

    /* 表单 */
    .form-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
    .form-group { display: flex; flex-direction: column; }
    .form-label { font-size: 12px; font-weight: 600; color: #6b7280; margin-bottom: 4px; }
    .form-input, .form-select {
      padding: 8px 12px; border: 1.5px solid #e5e7eb; border-radius: 8px;
      font-size: 13px; color: #0d0d0d; background: #fff; outline: none;
    }
    .form-input:focus, .form-select:focus { border-color: #0d0d0d; }

    /* 分页 */
    .pagination { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 16px; }
    .pagination button {
      padding: 6px 12px; border: 1px solid #e5e7eb; border-radius: 6px;
      background: #fff; cursor: pointer; font-size: 13px;
    }
    .pagination button.active { background: #0d0d0d; color: #fff; border-color: #0d0d0d; }
    .pagination button:disabled { opacity: .4; cursor: not-allowed; }

    /* 弹窗 */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 200;
      display: none; align-items: center; justify-content: center;
    }
    .modal-overlay.show { display: flex; }
    .modal-card {
      background: #fff; border-radius: 16px; width: 100%; max-width: 500px;
      box-shadow: 0 24px 64px rgba(0,0,0,.2); max-height: 90vh; overflow-y: auto;
    }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 24px 0; font-size: 17px; font-weight: 700;
    }
    .modal-close {
      width: 32px; height: 32px; border-radius: 50%; border: none;
      background: #f3f4f6; cursor: pointer; font-size: 18px; color: #6b7280;
    }
    .modal-body { padding: 20px 24px; }
    .modal-footer {
      padding: 16px 24px; display: flex; justify-content: flex-end; gap: 8px;
      border-top: 1px solid #f3f4f6;
    }

    /* 空状态 */
    .empty-state { text-align: center; padding: 40px 20px; color: #9ca3af; }
    .empty-state svg { width: 48px; height: 48px; margin-bottom: 12px; opacity: .4; }

    /* 移动端适配 */
    /* 按币种分布 */
    .bytype-row { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
    .bytype-name { width:110px; font-size:13px; color:#374151; flex-shrink:0; }
    .bytype-bar { flex:1; height:10px; background:#f3f4f6; border-radius:6px; overflow:hidden; }
    .bytype-bar i { display:block; height:100%; background:linear-gradient(90deg,#3b82f6,#8b5cf6); border-radius:6px; }
    .bytype-val { width:40px; text-align:right; font-size:13px; font-weight:700; color:#0d0d0d; }

    /* 7天趋势图 */
    .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px; }
    .chart { display:flex; align-items:flex-end; gap:10px; height:180px; padding-top:10px; }
    .chart-col { flex:1; display:flex; flex-direction:column; align-items:center; height:100%; }
    .chart-bars { flex:1; display:flex; align-items:flex-end; gap:5px; width:100%; justify-content:center; }
    .chart-bar { width:15px; border-radius:4px 4px 0 0; min-height:3px; }
    .chart-bar.total { background:#cbd5e1; }
    .chart-bar.paid { background:#10b981; }
    .chart-x { font-size:11px; color:#9ca3af; margin-top:6px; }
    .chart-legend { display:flex; gap:18px; font-size:12px; color:#6b7280; margin-top:10px; }
    .chart-legend .lg { display:inline-block; width:10px; height:10px; border-radius:2px; margin-right:5px; vertical-align:middle; }
    .chart-legend .lg.total { background:#cbd5e1; }
    .chart-legend .lg.paid { background:#10b981; }

    /* 汇率监控 */
    .card-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
    .card-head h3 { font-size:15px; font-weight:700; }
    .rate-row { display:flex; align-items:baseline; justify-content:space-between; padding:13px 0; border-bottom:1px solid #f3f4f6; }
    .rate-row:last-child { border-bottom:none; }
    .rate-name { font-size:13px; color:#6b7280; font-weight:600; }
    .rate-val { font-size:24px; font-weight:800; color:#0d0d0d; letter-spacing:-.5px; }
    .rate-val small { font-size:13px; color:#9ca3af; font-weight:600; margin-left:4px; }
    .rate-meta { margin-top:10px; font-size:12px; color:#9ca3af; line-height:1.6; }
    .rate-meta b { color:#10b981; font-weight:600; }

    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main { margin-left: 0; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .grid-2 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <!-- 侧边栏 -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="white">
        <path d="M17.06 11.57c.59-.69.94-1.58.94-2.57 0-2.21-1.79-4-4-4H7v14h7.5c2.49 0 4.5-2.01 4.5-4.5 0-1.33-.58-2.52-1.5-3.35l.56-.58zM9 7h4.5c.83 0 1.5.67 1.5 1.5S14.33 10 13.5 10H9V7zm5.5 10H9v-3h5.5c.83 0 1.5.67 1.5 1.5S15.33 17 14.5 17z"/>
      </svg>
      <span>OpenUSDT</span>
    </div>
    <nav class="sidebar-nav">
      <a class="nav-item active" href="index.html" data-page="dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        首页
      </a>
      <a class="nav-item" href="wallets.html" data-page="wallets">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 10h20"/></svg>
        钱包管理
      </a>
      <a class="nav-item" href="orders.html" data-page="orders">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        交易订单
      </a>
      <a class="nav-item" href="settings.html" data-page="settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.73 12.73l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        基本设置
      </a>
    </nav>
    <div class="sidebar-footer">
      <span id="userInfo">管理员</span> · <a href="#" id="logoutBtn" style="color:rgba(255,255,255,.6);text-decoration:none;">退出</a>
    </div>
  </aside>

  <!-- 主内容 -->
  <div class="main">
    <!-- 首页/统计面板 -->
    <div id="page-dashboard">
      <div class="page-header">
        <h1 class="page-title">首页</h1>
        <div class="page-actions">
          <button class="btn btn-outline" onclick="loadDashboard()">刷新数据</button>
        </div>
      </div>
      <div class="stats-grid" id="statsGrid">
        <div class="stat-card" style="border-color:#3b82f6">
          <div class="stat-label">订单总数</div>
          <div class="stat-value" id="statTotal">--</div>
          <div class="stat-sub" id="statToday">今日 --</div>
        </div>
        <div class="stat-card" style="border-color:#10b981">
          <div class="stat-label">已支付订单</div>
          <div class="stat-value" id="statSuccess">--</div>
          <div class="stat-sub" id="statAmount">收款 -- USDT</div>
        </div>
        <div class="stat-card" style="border-color:#f59e0b">
          <div class="stat-label">待支付订单</div>
          <div class="stat-value" id="statPending">--</div>
        </div>
        <div class="stat-card" style="border-color:#ef4444">
          <div class="stat-label">失败/过期</div>
          <div class="stat-value" id="statFailed">--</div>
        </div>
        <div class="stat-card" style="border-color:#8b5cf6">
          <div class="stat-label">确认中</div>
          <div class="stat-value" id="statConfirm">--</div>
          <div class="stat-sub">链上确认中</div>
        </div>
      </div>
      <div class="card">
        <h3 style="font-size:15px;font-weight:700;margin-bottom:16px;">最近7天趋势</h3>
        <div id="trendChart" style="min-height:180px;color:#9ca3af;text-align:center;padding:30px 0;">加载中...</div>
      </div>

      <div class="grid-2">
        <!-- 按币种分布 -->
        <div class="card">
          <h3 style="font-size:15px;font-weight:700;margin-bottom:16px;">成功收款 · 按币种</h3>
          <div id="byTypeBox"><div style="color:#9ca3af;text-align:center;padding:20px 0;">加载中...</div></div>
        </div>

        <!-- 汇率监控 -->
        <div class="card">
          <div class="card-head">
            <h3>汇率监控</h3>
            <button class="btn btn-outline btn-sm" id="btnRefreshRate" onclick="refreshRate()">刷新汇率</button>
          </div>
          <div class="rate-row">
            <span class="rate-name">USDT / CNY</span>
            <span class="rate-val" id="rateUsdt">--<small>¥</small></span>
          </div>
          <div class="rate-row">
            <span class="rate-name">USDC / CNY</span>
            <span class="rate-val" id="rateUsdc">--<small>¥</small></span>
          </div>
          <div class="rate-row">
            <span class="rate-name">TRX / CNY</span>
            <span class="rate-val" id="rateTrx">--<small>¥</small></span>
          </div>
          <div class="rate-meta">
            更新于 <span id="rateTime">--</span> · <span id="rateRel">--</span><br>
            来源 <b id="rateSrc">--</b> · 每 4 小时自动更新
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 弹窗容器 -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-card">
      <div class="modal-header">
        <span id="modalTitle">标题</span>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer" id="modalFooter"></div>
    </div>
  </div>

  <script src="admin-common.js"></script>
  <script>
    if (!Admin.requireAuth()) throw new Error('not logged in');

    // 加载管理员信息
    Admin.request('/api/admin/info', {}, 'POST').then(function (res) {
      if (res.data) document.getElementById('userInfo').textContent = res.data.username;
    });

    // 退出登录
    document.getElementById('logoutBtn').addEventListener('click', function (e) {
      e.preventDefault();
      Admin.request('/api/admin/logout', {}).then(function () {
        Admin.clearToken();
        window.location.href = 'login.html';
      });
    });

    // 弹窗
    function openModal(title, bodyHtml, footerHtml) {
      document.getElementById('modalTitle').textContent = title;
      document.getElementById('modalBody').innerHTML = bodyHtml;
      document.getElementById('modalFooter').innerHTML = footerHtml || '';
      document.getElementById('modalOverlay').classList.add('show');
    }
    function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }
    window.openModal = openModal;
    window.closeModal = closeModal;

    // 币种中文名映射
    var TRADE_NAMES = {
      'usdt.bep20': 'BSC-USDT', 'usdc.polygon': 'Polygon-USDC', 'usdt.trc20': 'TRON-USDT',
      'tron.trx': 'TRON-TRX', 'usdc.erc20': 'ETH-USDC', 'usdt.erc20': 'ETH-USDT',
      'usdt.arb': 'Arbitrum-USDT'
    };
    function fmt4(v) { return (parseFloat(v || 0)).toFixed(4); }
    function fmtAmt(v) { return (parseFloat(v || 0)).toFixed(2); }
    function fmtBjTime(ts) {
      if (!ts) return '未知';
      var d = new Date(Number(ts));
      var bj = new Date(d.getTime() + 8 * 3600 * 1000);
      var p = function (n) { return (n < 10 ? '0' : '') + n; };
      return bj.getUTCFullYear() + '-' + p(bj.getUTCMonth() + 1) + '-' + p(bj.getUTCDate()) + ' ' + p(bj.getUTCHours()) + ':' + p(bj.getUTCMinutes());
    }
    function relTime(ts) {
      if (!ts) return '';
      var m = Math.floor((Date.now() - Number(ts)) / 60000);
      if (m < 1) return '刚刚';
      if (m < 60) return m + ' 分钟前';
      var h = Math.floor(m / 60);
      if (h < 24) return h + ' 小时前';
      return Math.floor(h / 24) + ' 天前';
    }

    // 渲染：成功收款按币种分布（横向条）
    function renderByType(byType) {
      var box = document.getElementById('byTypeBox');
      if (!byType || !byType.length) { box.innerHTML = '<div style="color:#9ca3af;text-align:center;padding:20px 0;">暂无成功收款</div>'; return; }
      var max = Math.max.apply(null, byType.map(function (t) { return t.count; }));
      if (!max) max = 1;
      var html = '';
      byType.forEach(function (t) {
        var name = TRADE_NAMES[t.trade_type] || t.trade_type;
        var pct = Math.round(t.count / max * 100);
        html += '<div class="bytype-row"><span class="bytype-name">' + name + '</span>' +
          '<span class="bytype-bar"><i style="width:' + pct + '%"></i></span>' +
          '<span class="bytype-val">' + t.count + '</span></div>';
      });
      box.innerHTML = html;
    }

    // 渲染：最近7天趋势（柱状图，总订单 vs 已支付）
    function renderTrend(trend) {
      var box = document.getElementById('trendChart');
      if (!trend || !trend.length) { box.innerHTML = '<div style="color:#9ca3af;text-align:center;padding:30px 0;">暂无数据</div>'; return; }
      var max = Math.max.apply(null, trend.map(function (t) { return t.total || 0; }));
      if (!max) max = 1;
      var html = '<div class="chart">';
      trend.forEach(function (t) {
        var dt = (t.date || '').slice(5); // MM-DD
        var total = t.total || 0, paid = t.paid || 0;
        var hT = Math.max(3, Math.round(total / max * 100));
        var hP = Math.max(0, Math.round(paid / max * 100));
        html += '<div class="chart-col"><div class="chart-bars">' +
          '<div class="chart-bar total" style="height:' + hT + '%" title="总订单 ' + total + '"></div>' +
          '<div class="chart-bar paid" style="height:' + hP + '%" title="已支付 ' + paid + '"></div>' +
          '</div><div class="chart-x">' + dt + '</div></div>';
      });
      html += '</div><div class="chart-legend"><span><i class="lg total"></i>总订单</span><span><i class="lg paid"></i>已支付</span></div>';
      box.innerHTML = html;
    }

    // 渲染：汇率监控
    function renderRate(rate) {
      if (!rate) return;
      document.getElementById('rateUsdt').innerHTML = fmt4(rate.usdt_cny) + '<small>¥</small>';
      document.getElementById('rateUsdc').innerHTML = fmt4(rate.usdc_cny) + '<small>¥</small>';
      document.getElementById('rateTrx').innerHTML = fmt4(rate.trx_cny) + '<small>¥</small>';
      document.getElementById('rateTime').textContent = fmtBjTime(rate.updatedAt);
      document.getElementById('rateRel').textContent = relTime(rate.updatedAt);
      var srcMap = { live: '实时行情', db: '数据库', cache: '缓存', default: '默认值' };
      document.getElementById('rateSrc').textContent = srcMap[rate.source] || rate.source || '—';
    }

    // 加载统计 + 汇率
    function loadDashboard(forceRefresh) {
      var body = forceRefresh ? { refresh_rate: true } : {};
      Admin.request('/api/admin/dashboard', body).then(function (res) {
        if (res.status_code !== 200) return;
        var d = res.data;
        document.getElementById('statTotal').textContent = d.totalOrders || 0;
        document.getElementById('statToday').textContent = '今日 ' + (d.todayOrders || 0);
        document.getElementById('statSuccess').textContent = d.successOrders || 0;
        document.getElementById('statAmount').textContent = '收款 ' + fmtAmt(d.successAmount) + ' USDT';
        document.getElementById('statPending').textContent = d.pendingOrders || 0;
        document.getElementById('statFailed').textContent = (d.failedOrders || 0) + (d.expiredOrders || 0);
        document.getElementById('statConfirm').textContent = d.confirmingOrders || 0;

        renderByType(d.byType);
        renderTrend(d.trend);
        renderRate(d.rate);
      });
    }

    // 手动刷新汇率
    function refreshRate() {
      var btn = document.getElementById('btnRefreshRate');
      btn.disabled = true; btn.textContent = '刷新中...';
      loadDashboard(true);
      setTimeout(function () { btn.disabled = false; btn.textContent = '刷新汇率'; }, 1200);
      if (window.Admin && Admin.showToast) Admin.showToast('汇率已刷新', 'success');
    }

    loadDashboard();
  </script>
</body>
</html>
