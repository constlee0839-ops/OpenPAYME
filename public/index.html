<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenPAYME 支付网关</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: #fff; border-radius: 16px; padding: 48px 32px; max-width: 420px; width: 100%; text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
    .logo { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 24px; color: #1a1a1a; margin-bottom: 8px; }
    .sub { color: #999; font-size: 14px; margin-bottom: 32px; }
    .status { display: inline-flex; align-items: center; gap: 8px; background: #f0fdf4; color: #16a34a; padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 500; }
    .dot { width: 8px; height: 8px; background: #16a34a; border-radius: 50%; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .info { margin-top: 24px; padding-top: 24px; border-top: 1px solid #f0f0f0; }
    .info-row { display: flex; justify-content: space-between; padding: 8px 0; font-size: 13px; }
    .info-row .key { color: #999; }
    .info-row .val { color: #333; font-weight: 500; }
    .admin-link { display: inline-block; margin-top: 20px; padding: 10px 24px; background: #0d0d0d; color: #fff; text-decoration: none; border-radius: 10px; font-size: 14px; font-weight: 600; transition: background .2s; }
    .admin-link:hover { background: #1a1a1a; }
    .page-footer { margin-top: 28px; padding-top: 20px; border-top: 1px solid #f0f0f0; font-size: 13px; color: #999; }
    .page-footer a { color: #2563eb; text-decoration: none; font-weight: 600; }
    .page-footer a:hover { text-decoration: underline; }
    .page-footer .pf-name { font-weight: 700; color: #333; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">💰</div>
    <h1>OpenPAYME</h1>
    <div class="sub">多链 USDT/USDC 支付网关</div>
    <div class="status"><div class="dot"></div> 服务运行中</div>
    <div class="info">
      <div class="info-row"><span class="key">支持链</span><span class="val">BSC / ETH / Polygon / TRON</span></div>
      <div class="info-row"><span class="key">币种</span><span class="val">USDT / USDC / TRX</span></div>
      <div class="info-row"><span class="key">API</span><span class="val">兼容 BEpusdt</span></div>
      <div class="info-row"><span class="key">版本</span><span class="val">2.0.0</span></div>
    </div>
    <a href="admin/login.html" class="admin-link">管理后台</a>
    <div class="page-footer">Powered by <a href="https://github.com/constlee0839-ops/OpenPAYME/" target="_blank" rel="noopener">OpenPayMe</a></div>
  </div>
</body>
</html>
